name: Deploy to bitnest5

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and tag
        run: |
          git config user.name "deploy-bot"
          git config user.email "deploy-bot@bitnest"

          git fetch --tags

          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest_tag" ]; then
            major=1; minor=0; patch=1
          else
            version="${latest_tag#v}"
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)
            patch=$((patch + 1))
          fi
          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          echo "New version: ${new_version} (tag: ${new_tag})"

          sed -i 's/version = ".*"/version = "'"${new_version}"'"/' build.gradle.kts

          git add build.gradle.kts
          git commit -m "Bump version to ${new_version} [skip ci]"

          git tag "${new_tag}"

          git remote set-url origin http://git:${{ secrets.GITHUB_TOKEN }}@100.114.88.76:30000/hawk0120/watney4.git
          git push origin main --tags

      - name: Run tests
        run: ./gradlew test

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy and build native image
        run: |
          ssh hawk0120@${{ secrets.DEPLOY_HOST }} "
            set -e

            export JAVA_HOME=/usr/lib/jvm/graalvm
            export PATH=\$JAVA_HOME/bin:\$PATH

            cd /home/hawk0120/dev/kotlin/watney4

            git pull origin main

            ./gradlew nativeCompile
          "

      - name: Restart native app
        run: |
          ssh hawk0120@${{ secrets.DEPLOY_HOST }} "
            pkill -f 'watney4' 2>/dev/null || true

            cd /home/hawk0120/dev/kotlin/watney4

            nohup ./build/native/nativeCompile/watney4 \
              > /tmp/watney4.log 2>&1 &

            echo 'Bot restarted. PID: \$!'
            sleep 2
            tail -20 /tmp/watney4.log
          "

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "🚨 **Deploy failed!**\nRepo: `hawk0120/watney4`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}
